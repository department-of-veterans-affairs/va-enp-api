services:
  api:
    build:
      context: ..
      dockerfile: ./ci/Dockerfile
      args:
        POETRY_ARGS: --with static_tools,test,mkdocs
        TEST_FOLDER: tests
    container_name: enp-api
    ports:
      - 6012:6012
    entrypoint: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "6012", "--reload"]
    env_file:
      - .env.docker
    volumes:
      - "../app/:/app/app/:rw"
      - "../tests/:/app/tests/:rw"

  redis:
    image: redis
    ports:
      - "6379:6379"

  otel-collector:
    # Local development only - in production the Datadog Agent sidecar receives
    # telemetry on localhost:4317 and forwards to Datadog
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"